version: '3.8'

services:
  core-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ardupilot-core-engine
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      # Mount the logs directory so the engine can read uploaded logs
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  temporal-layer:
    build:
      context: ./temporal-layer
      dockerfile: Dockerfile
    container_name: ardupilot-temporal-layer
    ports:
      - "8001:8001"
    restart: unless-stopped

  llm-orchestrator:
    build:
      context: ./llm-orchestrator
      dockerfile: Dockerfile
    container_name: ardupilot-llm-orchestrator
    ports:
      - "8002:8002"
    restart: unless-stopped

  web-gateway:
    image: nginx:alpine
    container_name: ardupilot-web-gateway
    ports:
      - "80:80"
    # Placeholder for M4/M5 unified UI gateway

